<svg xmlns="http://www.w3.org/2000/svg" width="512" height="512" viewBox="0 0 200 200" role="img" aria-labelledby="title desc">
  <title id="title">ASkeleTon symbol</title>
  <desc id="desc">Símbolo vectorial de ASkeleTon: un monograma abstracto A construido con nodos y conexiones inspirado en un AST.</desc>

  <defs>
    <style>
      .line { stroke: #2563EB; stroke-width: 8; stroke-linecap: round; stroke-linejoin: round; fill: none; vector-effect: non-scaling-stroke; }
      .node { fill: #2563EB; }
    </style>
  </defs>

  <line class="line" x1="100" y1="20" x2="34" y2="130" />
  <line class="line" x1="100" y1="20" x2="166" y2="130" />
  <line class="line" x1="34" y1="130" x2="166" y2="130" />
  <line class="line" x1="34" y1="130" x2="100" y2="180" />
  <line class="line" x1="166" y1="130" x2="100" y2="180" />

  <circle class="node" cx="100" cy="20" r="10" />
  <circle class="node" cx="34" cy="130" r="10" />
  <circle class="node" cx="166" cy="130" r="10" />
  <circle class="node" cx="100" cy="180" r="10" />
</svg>
