<svg xmlns="http://www.w3.org/2000/svg" width="900" height="900" viewBox="0 0 900 900">
  <defs>
    <style>
      .title { font: 700 28px Arial, Helvetica, sans-serif; fill: #1f1f1f; }
      .label { font: 16px Arial, Helvetica, sans-serif; fill: #1f1f1f; }
      .small { font: 15px Arial, Helvetica, sans-serif; fill: #1f1f1f; }
      .box { stroke-width: 2; }
      .arrow { stroke: #333; stroke-width: 2.5; fill: none; marker-end: url(#arrow); }
    </style>
    <marker id="arrow" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="8" markerHeight="8" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#333"/>
    </marker>
  </defs>

  <text x="450" y="34" text-anchor="middle" class="title">ASkeleTon workflow</text>

  <rect x="215" y="60" rx="10" ry="10" width="470" height="75" fill="#f5f5f5" stroke="#9e9e9e" class="box"/>
  <text x="450" y="92" text-anchor="middle" class="label">
    <tspan x="450" dy="0">C/C++ project</tspan>
    <tspan x="450" dy="22">source files + compile_commands.json</tspan>
  </text>

  <rect x="170" y="185" rx="12" ry="12" width="560" height="90" fill="#e8f1fb" stroke="#5b8cc0" class="box"/>
  <text x="450" y="217" text-anchor="middle" class="label">
    <tspan x="450" dy="0" font-weight="700">1. Input layer</tspan>
    <tspan x="450" dy="22">CLI parsing, path normalization,</tspan>
    <tspan x="450" dy="22">compile database handling, optional bootstrap</tspan>
  </text>

  <rect x="170" y="325" rx="12" ry="12" width="560" height="90" fill="#e8f1fb" stroke="#5b8cc0" class="box"/>
  <text x="450" y="357" text-anchor="middle" class="label">
    <tspan x="450" dy="0" font-weight="700">2. Parsing and AST analysis</tspan>
    <tspan x="450" dy="22">Clang Tooling, AST construction,</tspan>
    <tspan x="450" dy="22">matcher traversal of translation units</tspan>
  </text>

  <rect x="170" y="465" rx="12" ry="12" width="560" height="90" fill="#e8f1fb" stroke="#5b8cc0" class="box"/>
  <text x="450" y="497" text-anchor="middle" class="label">
    <tspan x="450" dy="0" font-weight="700">3. Test generation engine</tspan>
    <tspan x="450" dy="22">candidate discovery, rule-guided values,</tspan>
    <tspan x="450" dy="22">eligibility checks, instance planning</tspan>
  </text>

  <rect x="55" y="630" rx="12" ry="12" width="360" height="105" fill="#eef8ef" stroke="#6aa56a" class="box"/>
  <text x="235" y="660" text-anchor="middle" class="label">
    <tspan x="235" dy="0" font-weight="700">4. Test emitter</tspan>
    <tspan x="235" dy="22">framework templates</tspan>
    <tspan x="235" dy="22">(GoogleTest / Boost.Test / Catch2)</tspan>
    <tspan x="235" dy="22">test code, fixture, cfg, Makefile</tspan>
  </text>

  <rect x="485" y="630" rx="12" ry="12" width="360" height="105" fill="#fff3e6" stroke="#d79b52" class="box"/>
  <text x="665" y="660" text-anchor="middle" class="label">
    <tspan x="665" dy="0" font-weight="700">5. Reporting subsystem</tspan>
    <tspan x="665" dy="22">JSON summary, by_reason counts,</tspan>
    <tspan x="665" dy="22">execution metadata and logs</tspan>
  </text>

  <rect x="55" y="800" rx="10" ry="10" width="360" height="70" fill="#f5f5f5" stroke="#9e9e9e" class="box"/>
  <text x="235" y="829" text-anchor="middle" class="small">
    <tspan x="235" dy="0">Generated test suite</tspan>
    <tspan x="235" dy="21">(framework-specific sources + cfg files)</tspan>
  </text>

  <rect x="485" y="800" rx="10" ry="10" width="360" height="70" fill="#f5f5f5" stroke="#9e9e9e" class="box"/>
  <text x="665" y="829" text-anchor="middle" class="small">
    <tspan x="665" dy="0">Structured execution report</tspan>
    <tspan x="665" dy="21">(report.json, log.json)</tspan>
  </text>

  <path d="M450 135 L450 183" class="arrow"/>
  <path d="M450 275 L450 323" class="arrow"/>
  <path d="M450 415 L450 463" class="arrow"/>
  <path d="M360 555 L235 628" class="arrow"/>
  <path d="M540 555 L665 628" class="arrow"/>
  <path d="M235 735 L235 798" class="arrow"/>
  <path d="M665 735 L665 798" class="arrow"/>
</svg>
