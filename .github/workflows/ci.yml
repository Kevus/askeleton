name: ci

on:
  push:
  pull_request:

jobs:
  build:
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-22.04, ubuntu-24.04]

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install LLVM/Clang 18 (Ubuntu 22.04)
        if: matrix.os == 'ubuntu-22.04'
        run: |
          sudo apt-get update
          sudo apt-get install -y wget ca-certificates
          wget -O /tmp/llvm.sh https://apt.llvm.org/llvm.sh
          sudo bash /tmp/llvm.sh 18
          sudo apt-get install -y clang-18 llvm-18 llvm-18-dev llvm-18-tools libclang-18-dev build-essential libgtest-dev libboost-dev catch2

      - name: Install LLVM/Clang 18 (Ubuntu 24.04)
        if: matrix.os == 'ubuntu-24.04'
        run: |
          sudo apt-get update
          sudo apt-get install -y clang-18 llvm-18 llvm-18-dev llvm-18-tools libclang-18-dev build-essential libgtest-dev libboost-dev catch2

      - name: Build
        run: |
          make -s clean CXX=clang++-18
          make -s CXX=clang++-18

      - name: Smoke test
        run: |
          cat > examples/compile_commands.json <<EOF
          [
            {
              "directory": "${GITHUB_WORKSPACE}/examples",
              "command": "clang++-18 -std=c++20 -c ${GITHUB_WORKSPACE}/examples/sut.cpp",
              "file": "${GITHUB_WORKSPACE}/examples/sut.cpp"
            }
          ]
          EOF
          ./askeleton --help
          ASKELETON_HOME=$(pwd) ./askeleton -p examples ${GITHUB_WORKSPACE}/examples/sut.cpp \
            --seed=123 --profile=random \
            --out-dir=/tmp/askeleton_smoke \
            --report=/tmp/askeleton_smoke/askeleton_report.json

      - name: Validate main documented workflow
        run: |
          ./scripts/check_main_workflow.sh

      - name: Validate default rule-data parity
        run: |
          ASKELETON_HOME=$(pwd) ./askeleton -p examples ${GITHUB_WORKSPACE}/examples/sut.cpp \
            --seed=123 \
            --out-dir=/tmp/askeleton_default_rules
          ASKELETON_HOME=$(pwd) ./askeleton --rule-data --rule-max-cases=3 \
            -p examples ${GITHUB_WORKSPACE}/examples/sut.cpp \
            --seed=123 \
            --out-dir=/tmp/askeleton_explicit_rules
          sed '/^\/\/\/\/ DATE:/d' /tmp/askeleton_default_rules/sut/sut.cfg > /tmp/default_sut.cfg
          sed '/^\/\/\/\/ DATE:/d' /tmp/askeleton_explicit_rules/sut/sut.cfg > /tmp/explicit_sut.cfg
          diff -u /tmp/default_sut.cfg /tmp/explicit_sut.cfg
          diff -u /tmp/askeleton_default_rules/sut/sut_test.cpp /tmp/askeleton_explicit_rules/sut/sut_test.cpp

      - name: Validate generated tests (GoogleTest)
        run: |
          ASKELETON_HOME=$(pwd) ./askeleton -p examples ${GITHUB_WORKSPACE}/examples/sut.cpp \
            --framework=gtest --seed=123 \
            --out-dir=/tmp/askeleton_gtest
          make -C /tmp/askeleton_gtest/sut
          (cd /tmp/askeleton_gtest/sut && ./sut_test)

      - name: Validate generated tests (Boost.Test)
        run: |
          ASKELETON_HOME=$(pwd) ./askeleton -p examples ${GITHUB_WORKSPACE}/examples/sut.cpp \
            --framework=boost --seed=123 \
            --out-dir=/tmp/askeleton_boost
          make -C /tmp/askeleton_boost/sut
          (cd /tmp/askeleton_boost/sut && ./sut_test)

      - name: Validate generated tests (Catch2)
        run: |
          ASKELETON_HOME=$(pwd) ./askeleton -p examples ${GITHUB_WORKSPACE}/examples/sut.cpp \
            --framework=catch --seed=123 \
            --out-dir=/tmp/askeleton_catch
          make -C /tmp/askeleton_catch/sut
          (cd /tmp/askeleton_catch/sut && ./sut_test)

      - name: Validate preserved compile standard
        run: |
          mkdir -p /tmp/askeleton_cpp20
          cat > /tmp/askeleton_cpp20/cpp20.cpp <<'EOF'
          #include <algorithm>
          #include <ranges>
          #include <vector>
          int count_ones(const std::vector<int>& values) {
              return std::ranges::count(values, 1);
          }
          EOF
          cat > /tmp/askeleton_cpp20/compile_commands.json <<EOF
          [
            {
              "directory": "/tmp/askeleton_cpp20",
              "command": "clang++-18 -std=c++20 -c /tmp/askeleton_cpp20/cpp20.cpp",
              "file": "/tmp/askeleton_cpp20/cpp20.cpp"
            }
          ]
          EOF
          ASKELETON_HOME=$(pwd) ./askeleton -p /tmp/askeleton_cpp20 /tmp/askeleton_cpp20/cpp20.cpp \
            --framework=gtest --seed=123 \
            --out-dir=/tmp/askeleton_cpp20/out
          make -C /tmp/askeleton_cpp20/out/cpp20
